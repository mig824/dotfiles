# Clean minimal — directory + branch on top, arrow below

format = """
$hostname\
$directory\
$git_branch\
$git_status
$character"""

[hostname]
ssh_only = false
format = "[$hostname]($style) "
style = "bold #FF8800"

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = "[$branch]($style) "

[git_status]
format = '([$all_status$ahead_behind]($style))'

# Disable everything else
[python]
disabled = true

[golang]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true

[nodejs]
disabled = true

[package]
disabled = true

[docker_context]
disabled = true

[rust]
disabled = true
