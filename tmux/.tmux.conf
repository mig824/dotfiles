### General Settings

# Reload config with Prefix + r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Increase scrollback history
set -g history-limit 50000

# No delay on Escape (default 500ms makes nvim mode switching sluggish)
set -sg escape-time 0

# Let nvim detect file changes from other panes (e.g. Claude editing files)
set -g focus-events on

# Start window/pane numbering at 1 and renumber on close
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Switch to next session instead of detaching when a session is destroyed
set -g detach-on-destroy off

### User Interface

# Enable mouse support
set -g mouse on

# Use vi-style key bindings in copy mode
setw -g mode-keys vi
bind v copy-mode
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# Allow easier pane resizing with Alt + arrow keys
bind -n M-Left resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up resize-pane -U 5
bind -n M-Down resize-pane -D 5

# Split windows using | and - (preserve working directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switch panes using vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Easily swap panes
bind < swap-pane -U
bind > swap-pane -D

### Status Bar
set -g status-style bg=colour235,fg=colour250
set -g status-interval 5
set -g status-position top
set -g status-justify centre

# Left: session name in orange powerline block
set -g status-left-length 30
set -g status-left '#[fg=colour235,bg=colour208,bold] ❐ #S #[fg=colour208,bg=colour235,nobold]'

# Right: load avg + memory (platform-aware)
set -g status-right-length 40
if-shell 'test -f /proc/loadavg' {
  set -g status-right "#[fg=colour208] #(cut -d ' ' -f1 /proc/loadavg) #[fg=colour240]│#[fg=colour208] #(free -m | awk 'NR==2{printf \"%d%%\", $3*100/$2}') "
} {
  set -g status-right "#[fg=colour208] #(sysctl -n vm.loadavg | awk '{print $2}') "
}

# Window tabs: inactive muted, active in orange powerline block
set -g window-status-format '#[fg=colour245,bg=colour235] #I:#W '
set -g window-status-current-format '#[fg=colour235,bg=colour208]#[fg=colour235,bg=colour208,bold] #I:#W #[fg=colour208,bg=colour235]'
set -g window-status-separator ''

# Pane borders — dim inactive, highlight active
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour208

### Clipboard
# Allow OSC 52 escape sequences to pass through to the terminal
set -g set-clipboard on
set -g allow-passthrough on

### Terminal compatibility
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB"

# Undercurl support (Ghostty renders curly underlines for LSP diagnostics)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
# Colored underlines (error=red, warn=yellow, etc.)
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

### FZF
# Prefix + f → fuzzy switch to any window across all sessions
bind f run-shell "tmux list-windows -a -F '##{session_name}:##{window_index} ##{window_name}' | fzf-tmux -p 60%,40% | cut -d' ' -f1 | xargs tmux switch-client -t"

### Plugins
set -g @plugin 'tmux-plugins/tmux-resurrect'
run '~/.tmux/plugins/tpm/tpm'
